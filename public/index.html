<!DOCTYPE html>

<html lang="lv">

<head>

    <meta charset="UTF-8">

    <title>Seshio Dashboard</title>

    <style>

        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; }

        .sidebar { width: 250px; background: #ffffff; height: 100vh; border-right: 1px solid #ddd; padding: 20px; box-sizing: border-box; }

        .main { flex: 1; padding: 40px; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; }

        h2 { color: #1a73e8; margin-top: 0; }

        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #555; }

        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }

        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; }

        button:hover { background: #1557b0; }

        .info { font-size: 12px; color: #888; margin-top: 5px; }

    </style>

</head>

<body>

    <div class="sidebar">

        <h3>Seshio Panel</h3>

        <p style="color: #1a73e8; font-weight: bold;">Settings</p>

    </div>

    <div class="main">

        <div class="card">

            <h2>Sesijas Konfigurācija</h2>

            

            <label>Discord Servera ID (Guild ID)</label>

            <input type="text" id="guildId" placeholder="Ielīmē sava servera ID">

            <div class="info">Labais klikšķis uz servera ikonas -> Copy ID</div>



            <label>Pinga lomas ID</label>

            <input type="text" id="pingRole" placeholder="Piemēram, 1122334455667788">



            <label>Vajadzīgās balsis</label>

            <input type="number" id="requiredVotes" value="1">



            <label>Sesijas sākuma bilde (URL)</label>

            <input type="text" id="startImage" placeholder="https://i.imgur.com/example.png">



            <label>Sesijas teksts</label>

            <textarea id="startText" rows="4" placeholder="Kas parādīsies balsošanas ziņā?"></textarea>



            <button onclick="save()">SAGLABĀT IZMAIŅAS</button>

        </div>

    </div>



    <script>

        async function save() {

            const data = {

                guildId: document.getElementById('guildId').value,

                pingRole: document.getElementById('pingRole').value,

                requiredVotes: document.getElementById('requiredVotes').value,

                startImage: document.getElementById('startImage').value,

                startText: document.getElementById('startText').value

            };



            const res = await fetch('/api/save-settings', {

                method: 'POST',

                headers: { 'Content-Type': 'application/json' },

                body: JSON.stringify(data)

            });



            if (res.ok) alert("✅ Iestatījumi saglabāti!");

            else alert("❌ Kļūda saglabājot!");

        }

    </script>

</body>

</html>
