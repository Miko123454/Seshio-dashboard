<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seshio | Bot Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #181b21;
            --accent-cyan: #00e5ff;
            --accent-blue: #0077ff;
            --text-light: #e0e0e0;
            --text-muted: #8b92a5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- SĀKUMLAPA (LANDING PAGE) --- */
        #landing-page {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
        }

        .hero-text {
            max-width: 500px;
        }

        .hero-text h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-invite {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        .btn-invite:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5);
        }

        .hero-image {
            width: 45%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Šeit kods meklēs tavu bg.jpg bildi no public mapes */
            content: url('bg.jpg'); 
        }

        /* --- DASHBOARD SKATS --- */
        #dashboard-page {
            display: none; /* Sākumā paslēpts */
            height: 100vh;
        }

        .sidebar {
            width: 80px;
            background-color: var(--bg-panel);
            border-right: 1px solid #2a2e38;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .server-icon {
            width: 50px;
            height: 50px;
            background-color: #2b2f3a;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
        }

        .server-icon:hover, .server-icon.active {
            background-color: var(--accent-blue);
            color: white;
            border-radius: 15px;
        }

        .settings-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .settings-panel h2 {
            margin-top: 0;
            font-size: 24px;
            border-bottom: 1px solid #2a2e38;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
            max-width: 600px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            background-color: var(--bg-panel);
            border: 1px solid #2a2e38;
            color: white;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .btn-save {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-save:hover { background-color: #005ce6; }

    </style>
</head>
<body>

    <div id="landing-page">
        <div class="hero-text">
            <h1>Seshio System</h1>
            <p>Automatizē savas lomu spēles sesijas, pārvaldi balsojumus un uzturi kārtību savā serverī ar vienu modernu Discord botu.</p>
            <button class="btn-invite" onclick="enterDashboard()">Ielogoties / Invite Bot</button>
        </div>
        <img class="hero-image" alt="Seshio AI Image" onerror="this.style.display='none'">
    </div>

    <div id="dashboard-page">
        <div class="sidebar">
            <div class="server-icon active" title="LVRPL Serveris">LV</div>
            <div class="server-icon" title="Cits Serveris">CS</div>
            <div class="server-icon" title="Pievienot jaunu">+</div>
        </div>

        <div class="settings-panel">
            <h2>LVRPL Konfigurācija</h2>
            
            <div class="form-group">
                <label>Discord Servera ID (Guild ID)</label>
                <input type="text" id="guildId" placeholder="Ielīmē sava servera ID te...">
            </div>

            <div class="form-group">
                <label>Pinga Lomas ID</label>
                <input type="text" id="pingRole" placeholder="Role ID, ko pingot sesijas sākumā">
            </div>

            <div class="form-group">
                <label>Vajadzīgās balsis</label>
                <input type="number" id="requiredVotes" value="1">
            </div>

            <div class="form-group">
                <label>Sesijas Bilde (URL)</label>
                <input type="text" id="startImage" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>Sesijas Teksts</label>
                <textarea id="startText" rows="5" placeholder="Ievadi ziņu, ko bots rādīs..."></textarea>
            </div>

            <button class="btn-save" onclick="saveSettings()">SAGLABĀT IZMAIŅAS</button>
        </div>
    </div>

    <script>
        // Funkcija, kas nomaina sākumlapu uz Dashboardu
        function enterDashboard() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'flex';
        }

        // Funkcija, kas saglabā datus datu bāzē
        async function saveSettings() {
            const data = {
                guildId: document.getElementById('guildId').value,
                pingRole: document.getElementById('pingRole').value,
                requiredVotes: document.getElementById('requiredVotes').value,
                startImage: document.getElementById('startImage').value,
                startText: document.getElementById('startText').value
            };

            const res = await fetch('/api/save-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) alert("✅ Iestatījumi veiksmīgi saglabāti!");
            else alert("❌ Kļūda saglabājot datus!");
        }
    </script>
</body>
</html>
