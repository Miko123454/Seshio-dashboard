<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seshio System | Bot Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-dark: #091216;
            --bg-card: rgba(15, 25, 30, 0.8);
            --accent-cyan: #4cebda;
            --accent-blue: #6c5ce7;
            --accent-gold: #f1c40f;
            --text-light: #ffffff;
            --text-muted: #9aa8b1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 70% 50%, rgba(76, 235, 218, 0.1), transparent 50%),
                              radial-gradient(circle at 10% 90%, rgba(76, 235, 218, 0.05), transparent 40%);
        }

        /* --- SĀKUMLAPA --- */
        #landing-page { display: flex; width: 100%; height: 100vh; align-items: center; justify-content: center; flex-direction: column; text-align: center; z-index: 10; }
        #landing-page h1 { font-size: 4rem; color: var(--accent-cyan); margin-bottom: 20px; font-weight: 800; }
        .btn-login { background-color: var(--accent-blue); color: white; padding: 18px 40px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 1.2rem; transition: 0.3s; }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(108, 92, 231, 0.4); }

        /* --- SERVERU IZVĒLNE --- */
        #server-selector-page { display: none; width: 100%; height: 100vh; padding: 60px 10%; overflow-y: auto; z-index: 20; }
        .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .server-card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid rgba(76,235,218,0.2); text-align: center; cursor: pointer; transition: 0.3s; }
        .server-card:hover { border-color: var(--accent-cyan); transform: translateY(-5px); }

        /* --- DASHBOARD --- */
        #dashboard-page { display: none; width: 100%; height: 100vh; z-index: 20; flex: 1; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1.1fr; gap: 30px; }
        
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { color: var(--accent-cyan); display: flex; align-items: center; gap: 15px; }
        .premium-badge { background: var(--accent-gold); color: black; font-size: 12px; padding: 4px 10px; border-radius: 4px; font-weight: 800; display: none; }

        .panel { background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid rgba(76,235,218,0.15); }
        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(76,235,218,0.2); padding: 12px; color: white; border-radius: 8px; margin-bottom: 20px; }
        
        /* PREMIUM LOCK */
        .premium-locked { opacity: 0.4; pointer-events: none; }
        .lock-text { color: var(--accent-gold); font-size: 11px; margin-left: 5px; }

        .btn-save { background: var(--accent-cyan); color: black; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-premium { background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 15px; width: 100%; display: block; text-decoration: none; text-align: center; }

        /* --- DISCORD PREVIEW (COMPACT) --- */
        .preview-panel { background: #313338; border-radius: 8px; padding: 16px; align-self: start; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .discord-message { display: flex; gap: 12px; align-items: flex-start; }
        .discord-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; overflow: hidden; }
        .discord-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .discord-name { font-weight: 500; color: #f2f3f5; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
        .bot-tag { background: #5865F2; color: white; font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 600; }
        
        .discord-embed { background: #2b2d31; border-radius: 4px; border-left: 4px solid var(--accent-cyan); padding: 8px 12px 12px; margin-top: 4px; max-width: 432px; }
        .embed-flex { display: flex; justify-content: space-between; gap: 12px; }
        .embed-main { flex: 1; min-width: 0; }
        .embed-title { font-weight: 600; color: #f2f3f5; font-size: 16px; margin-bottom: 4px; }
        .embed-desc { font-size: 14px; color: #dbdee1; line-height: 1.3; white-space: pre-wrap; }
        .embed-thumb { width: 72px; height: 72px; border-radius: 4px; object-fit: cover; flex-shrink: 0; display: none; }
        .embed-footer { font-size: 12px; color: #f2f3f5; font-weight: 700; margin-top: 8px; }

        .discord-btn { background: #248046; color: white; padding: 6px 16px; border-radius: 3px; font-size: 14px; font-weight: 500; border: none; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>SESHIO</h1>
        <a href="https://discord.com/api/oauth2/authorize?client_id=1485224120047108237&redirect_uri=https%3A%2F%2Fseshio.lat%2F&response_type=token&scope=identify%20guilds" class="btn-login">LOGIN WITH DISCORD</a>
    </div>

    <div id="server-selector-page">
        <h2 style="color: var(--accent-cyan);">Izvēlies serveri</h2>
        <div class="server-grid" id="server-list">Ielādē...</div>
    </div>

    <div id="dashboard-page">
        <div class="main-content">
            <div class="header">
                <h2 id="srv-name">Server Settings <span class="premium-badge" id="prem-badge">👑 PREMIUM</span></h2>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--accent-cyan); cursor:pointer;">⬅ Atpakaļ</button>
            </div>

            <div class="panel">
                <label>Virsraksts (Embed Title)</label>
                <input type="text" id="title" oninput="updatePreview()">

                <label>Piekļuves Kods <span id="lock-code" class="lock-text">👑 PREMIUM ONLY</span></label>
                <input type="text" id="code" class="premium-locked" oninput="updatePreview()">

                <label>Bilde (URL) <span id="lock-img" class="lock-text">👑 PREMIUM ONLY</span></label>
                <input type="text" id="img" class="premium-locked" oninput="updatePreview()">

                <label>Paziņojuma Teksts</label>
                <textarea id="text" rows="4" oninput="updatePreview()"></textarea>

                <button class="btn-save" onclick="save()">SAGLABĀT IZMAIŅAS</button>
                <button class="btn-premium" id="buy-btn" onclick="buy()">👑 UPGRADE TO PREMIUM</button>
            </div>

            <div class="preview-panel">
                <div class="preview-header">Live Discord Preview</div>
                <div class="discord-message">
                    <div class="discord-avatar">
                        <img src="https://cdn.discordapp.com/attachments/1485233746994139147/1485345443914453246/bj.jpg?ex=69c6247e&is=69c4d2fe&hm=b95d392ab9a45c90d5fd6b048632722a6f4b80de511b4f81ee58ca762426e9f5&" alt="Bot">
                    </div>
                    <div class="discord-content">
                        <div class="discord-name">Seshio <span class="bot-tag">APP</span></div>
                        <div class="discord-embed">
                            <div class="embed-flex">
                                <div class="embed-main">
                                    <div class="embed-title" id="pre-title">LVRPL | Session</div>
                                    <div id="pre-code-box" style="display:none; margin: 4px 0;"><strong id="pre-code" style="color:white;"></strong></div>
                                    <div class="embed-desc" id="pre-text">Sāksim jaunu sesiju!</div>
                                </div>
                                <img id="pre-img" class="embed-thumb">
                            </div>
                            <div class="embed-footer" id="pre-footer">Votes: 0 / 10</div>
                        </div>
                        <button class="discord-btn">VOTE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://seshio-dashboard.onrender.com';
        let currentGuildId = null;
        let isPremium = false;

        window.onload = async () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const token = fragment.get('access_token');
            if (token) {
                document.getElementById('landing-page').style.display = 'none';
                document.getElementById('server-selector-page').style.display = 'block';
                
                const userGuilds = await fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json());
                const botGuilds = await fetch(`${API}/api/bot-guilds`).then(r => r.json());
                
                const list = document.getElementById('server-list');
                list.innerHTML = '';
                userGuilds.filter(g => (g.permissions & 0x8) === 0x8).forEach(g => {
                    const card = document.createElement('div');
                    card.className = 'server-card';
                    card.innerHTML = `<strong>${g.name}</strong>`;
                    card.onclick = () => openDashboard(g.id, g.name);
                    list.appendChild(card);
                });
            }
        };

        async function openDashboard(id, name) {
            currentGuildId = id;
            document.getElementById('server-selector-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'flex';
            document.getElementById('srv-name').firstChild.textContent = name + " ";

            const res = await fetch(`${API}/api/settings/${id}`).then(r => r.json());
            isPremium = res.isPremium;

            document.getElementById('title').value = res.embedTitle || '';
            document.getElementById('code').value = res.embedCode || '';
            document.getElementById('img').value = res.startImage || '';
            document.getElementById('text').value = res.startText || '';

            // Premium stāvoklis
            if (isPremium) {
                document.getElementById('prem-badge').style.display = 'inline-block';
                document.getElementById('buy-btn').style.display = 'none';
                document.getElementById('code').classList.remove('premium-locked');
                document.getElementById('img').classList.remove('premium-locked');
                document.getElementById('lock-code').style.display = 'none';
                document.getElementById('lock-img').style.display = 'none';
            } else {
                document.getElementById('prem-badge').style.display = 'none';
                document.getElementById('buy-btn').style.display = 'block';
                document.getElementById('code').classList.add('premium-locked');
                document.getElementById('img').classList.add('premium-locked');
            }
            updatePreview();
        }

        function updatePreview() {
            document.getElementById('pre-title').innerText = document.getElementById('title').value || 'LVRPL | Session';
            document.getElementById('pre-text').innerText = document.getElementById('text').value || 'Sāksim jaunu sesiju!';
            
            if (isPremium) {
                const code = document.getElementById('code').value;
                if(code) { document.getElementById('pre-code-box').style.display = 'block'; document.getElementById('pre-code').innerText = `KODS: ${code}`; }
                else { document.getElementById('pre-code-box').style.display = 'none'; }
                
                const img = document.getElementById('img').value;
                if(img) { document.getElementById('pre-img').src = img; document.getElementById('pre-img').style.display = 'block'; }
                else { document.getElementById('pre-img').style.display = 'none'; }
            } else {
                document.getElementById('pre-code-box').style.display = 'none';
                document.getElementById('pre-img').style.display = 'none';
            }
        }

        async function save() {
            await fetch(`${API}/api/save-settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    guildId: currentGuildId,
                    embedTitle: document.getElementById('title').value,
                    embedCode: isPremium ? document.getElementById('code').value : '',
                    startImage: isPremium ? document.getElementById('img').value : '',
                    startText: document.getElementById('text').value
                })
            });
            alert('Saglabāts!');
        }

        async function buy() {
            const res = await fetch(`${API}/api/create-checkout-session`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ guildId: currentGuildId })
            }).then(r => r.json());
            if(res.url) window.location.href = res.url;
        }
    </script>
</body>
</html>
