<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seshio | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-main: #0a1118;
            --bg-panel: #111a22;
            --border-glow: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --accent-cyan: #00f2fe;
            --accent-green: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 242, 254, 0.05), transparent 40%);
        }

        /* --- SĀKUMLAPA (LANDING PAGE) --- */
        #landing-page {
            display: flex;
            width: 100%;
            height: 100vh;
            align-items: center;
            justify-content: center;
            gap: 100px;
            padding: 0 10%;
            z-index: 50;
        }

        .hero-text { max-width: 500px; }
        .hero-text h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffffff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-text p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }

        /* Jaunās pogas */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-add {
            background-color: #c2295a; /* Rozā/sarkans no tavas bildes */
            color: white;
            padding: 14px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: opacity 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(194, 41, 90, 0.4);
        }
        .btn-add:hover { opacity: 0.8; }

        .btn-login {
            background-color: #2b2d31; /* Discord dark grey */
            color: white;
            padding: 14px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-login:hover { background-color: #3b3d42; }

        /* Bilde - SALABOTA */
        .hero-image {
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2);
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        /* --- DASHBOARD SKATS --- */
        #dashboard-page {
            display: none; /* Sākumā slēpts */
            width: 100%;
            height: 100vh;
        }

        /* (Šeit paliek viss iepriekšējais Dashboard CSS. Es to saīsināju, lai tu redzētu galveno, bet atstāju struktūru) */
        .sidebar { width: 260px; background-color: var(--bg-panel); border-right: 1px solid rgba(0, 242, 254, 0.2); display: flex; flex-direction: column; padding: 25px 20px; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; color: var(--text-main); }
        .logo span { color: var(--accent-cyan); margin-right: 10px; font-size: 28px; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-weight: 500; }
        .nav-item.active { background: linear-gradient(90deg, rgba(0, 242, 254, 0.15) 0%, transparent 100%); color: var(--accent-cyan); border-left: 3px solid var(--accent-cyan); }
        .section-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin: 30px 0 15px 15px; font-weight: 700; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 5px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        .panel { background-color: rgba(17, 26, 34, 0.8); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 16px; padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        input, textarea { width: 100%; background-color: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 242, 254, 0.15); border-radius: 8px; color: var(--text-main); padding: 12px 15px; font-size: 14px; }
        .btn-save { width: 100%; background: var(--accent-cyan); color: #000; border: none; padding: 16px; border-radius: 8px; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="landing-page">
        <div class="hero-text">
            <h1>Seshio System</h1>
            <p>Automatizē savas lomu spēles sesijas, pārvaldi balsojumus un uzturi kārtību savā serverī ar vienu modernu Discord botu.</p>
            
            <div class="button-group">
                <a href="https://discord.com/api/oauth2/authorize?client_id=1485224120047108237&permissions=8&scope=bot%20applications.commands" target="_blank" class="btn-add">Add To Server</a>
                
                <button onclick="enterDashboard()" class="btn-login">Login with Discord</button>
            </div>
        </div>

        <img class="hero-image" src="bj.jpg" alt="Seshio Logo">
    </div>


    <div id="dashboard-page">
        <div class="sidebar">
            <div class="logo"><span>❂</span> SESHIO</div>
            <a href="#" class="nav-item active">Dashboard</a>
            <div class="section-title">SERVERI</div>
            <a href="#" class="nav-item active">LV RPL</a>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Server Settings | LV RPL Server</h1>
                <p>Konfigurē sava servera sesijas un moduļus.</p>
            </div>

            <div class="panel">
                <div class="form-group">
                    <label>Guild ID</label>
                    <input type="text" id="guildId" placeholder="Ielīmē servera ID" value="">
                </div>
                <div class="form-group">
                    <label>Ping Role ID</label>
                    <input type="text" id="pingRole" placeholder="Role ID...">
                </div>
                <div class="form-group">
                    <label>Required Votes</label>
                    <input type="number" id="requiredVotes" value="1">
                </div>
                <div class="form-group">
                    <label>Start Image (URL)</label>
                    <input type="text" id="startImage" placeholder="https://i.imgur.com/...">
                </div>
                <div class="form-group">
                    <label>Start Text</label>
                    <textarea id="startText" rows="4">Sāksim jaunu sesiju!</textarea>
                </div>
                <button class="btn-save" onclick="saveData()">SAGLABĀT IZMAIŅAS</button>
            </div>
        </div>
    </div>

    <script>
        // Pāreja no sākumlapas uz paneli
        function enterDashboard() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'flex';
        }

        // Datu saglabāšana (Tavs iepriekšējais kods)
        async function saveData() {
            const btn = document.querySelector('.btn-save');
            btn.innerHTML = 'SAGLABĀ...';
            
            const data = {
                guildId: document.getElementById('guildId').value,
                pingRole: document.getElementById('pingRole').value,
                requiredVotes: document.getElementById('requiredVotes').value,
                startImage: document.getElementById('startImage').value,
                startText: document.getElementById('startText').value
            };

            try {
                const res = await fetch('/api/save-settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(res.ok) {
                    btn.innerHTML = '✅ SAGLABĀTS!';
                    btn.style.background = 'var(--accent-green)';
                } else {
                    btn.innerHTML = '❌ KĻŪDA!';
                }
            } catch (err) {
                btn.innerHTML = '❌ KĻŪDA SAZIŅĀ';
            }
            setTimeout(() => { btn.innerHTML = 'SAGLABĀT IZMAIŅAS'; btn.style.background = ''; }, 3000);
        }
    </script>
</body>
</html>
